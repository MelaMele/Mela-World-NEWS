name: Opera News Telegram Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # GitHub Actions ፋይል ማሻሻል/Push ማድረግ እንዲችል መብት ይሰጠዋል

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # ወደ v4 ተሻሽሏል

      - name: Set up Python
        uses: actions/setup-python@v5  # ወደ v5 ተሻሽሏል
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests bs4 python-telegram-bot

      - name: Run Scraper Script
        run: python main.py

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sent_news.json
          git commit -m "Update sent news database" || exit 0
          git push
